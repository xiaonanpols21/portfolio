<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="850" height="850" viewBox="0 0 850 850">
  <defs>
    <linearGradient id="linear-gradient" x1="0.5" x2="0.5" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0" stop-color="#ffcfcb"/>
      <stop offset="1" stop-color="#fea098"/>
    </linearGradient>
    <filter id="Ellipse_1" x="0" y="0" width="850" height="850" filterUnits="userSpaceOnUse">
      <feOffset dx="20" dy="3" input="SourceAlpha"/>
      <feGaussianBlur stdDeviation="25" result="blur"/>
      <feFlood flood-opacity="0.161"/>
      <feComposite operator="in" in2="blur"/>
      <feComposite in="SourceGraphic"/>
    </filter>
  </defs>
  <g transform="matrix(1, 0, 0, 1, 0, 0)" filter="url(#Ellipse_1)">
    <circle id="Ellipse_1-2" data-name="Ellipse 1" cx="350" cy="350" r="350" transform="translate(55 72)" fill="url(#linear-gradient)"/>
  </g>
</svg>
